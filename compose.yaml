services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: localchat
      POSTGRES_PASSWORD: localchat
      POSTGRES_DB: localchat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localchat"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
